defaultContentLanguage = 'nl'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[params]
  email = "info@thebigdatacompany.nl"
  address = "Mr. Treublaan 7, 1097 DP Amsterdam"
  linkedin = "https://www.linkedin.com/company/the-big-data-company-bv"

[languages]
  [languages.nl]
    languageName = 'NL'
    languageCode = 'nl-NL'
    weight = 1
    title = 'The Big Data Company'
