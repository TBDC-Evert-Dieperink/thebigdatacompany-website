{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <span class="eyebrow">{{ .Site.Title }}</span>
    <h1>{{ .Title }}</h1>
    {{ with .Params.lead }}<p class="page-lead">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="section">
  <div class="container prose">
    {{ .Content }}
  </div>
</section>
{{ end }}
